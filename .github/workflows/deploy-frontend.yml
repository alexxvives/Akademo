name: Deploy Frontend Worker

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'next.config.js'
      - 'tailwind.config.ts'
      - 'wrangler.toml'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Frontend
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Build types package
        run: npm run build:types

      - name: Build and Deploy Worker
        run: npx @opennextjs/cloudflare build && npx @opennextjs/cloudflare deploy
        env:
          NEXT_PUBLIC_API_URL: "https://akademo-api.alexxvives.workers.dev"
          NEXT_PUBLIC_ZOOM_CLIENT_ID: "W2jPo9CJR0uZbFnEWtBF7Q"
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_51Sr91MGnG2OZ2dGGUw3ObiVNKVVFUmbvmckFtbpjQK7KRHb8M1xUayFK8QcURcUFLBcEhux80JZPQsb7z6X91ANZ00ApZwt376"
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: "AIzaSyDUn8h1Aw7RwCYRxHiPl3hfOLfcKqrqsmM"
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
