<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111318"/>
      <stop offset="50%" style="stop-color:#1a1d24"/>
      <stop offset="100%" style="stop-color:#111318"/>
    </linearGradient>
    <linearGradient id="logo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative line -->
  <rect x="200" y="185" width="800" height="1" fill="url(#accent)"/>
  <rect x="200" y="445" width="800" height="1" fill="url(#accent)"/>
  
  <!-- Logo box -->
  <rect x="504" y="110" rx="16" ry="16" width="56" height="56" fill="url(#logo)"/>
  <text x="532" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="white" text-anchor="middle">A</text>
  
  <!-- Brand name -->
  <text x="600" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="white" text-anchor="middle" dx="35">KADEMO</text>
  
  <!-- Title -->
  <text x="600" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="600" fill="#e2e8f0" text-anchor="middle">Software de Gestión para Academias</text>
  
  <!-- Subtitle -->
  <text x="600" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="19" fill="#94a3b8" text-anchor="middle">Protege tu contenido · Evita cuentas compartidas · Gestiona tu academia</text>
  
  <!-- Feature pills -->
  <rect x="138" y="350" rx="20" ry="20" width="180" height="40" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="228" y="376" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#a5b4fc" text-anchor="middle">Marca de agua</text>
  
  <rect x="348" y="350" rx="20" ry="20" width="175" height="40" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="435" y="376" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#a5b4fc" text-anchor="middle">Anti-piratería</text>
  
  <rect x="553" y="350" rx="20" ry="20" width="195" height="40" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="650" y="376" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#a5b4fc" text-anchor="middle">Clases en directo</text>
  
  <rect x="778" y="350" rx="20" ry="20" width="195" height="40" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="875" y="376" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#a5b4fc" text-anchor="middle">Gestión integral</text>
  
  <!-- CTA hint -->
  <rect x="450" y="420" rx="24" ry="24" width="300" height="48" fill="url(#logo)"/>
  <text x="600" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="600" fill="white" text-anchor="middle">Solicitar Demo Gratuita</text>
  
  <!-- Domain -->
  <text x="600" y="560" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#64748b" text-anchor="middle">akademo-edu.com</text>
  
  <!-- Bottom decorative dots -->
  <circle cx="570" cy="590" r="3" fill="#6366f1" opacity="0.4"/>
  <circle cx="590" cy="590" r="3" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="610" cy="590" r="3" fill="#6366f1" opacity="0.4"/>
  <circle cx="630" cy="590" r="3" fill="#8b5cf6" opacity="0.4"/>
</svg>
